<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Elegance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        /* Admin specific styles */
        .admin-main { max-width: 1200px; margin: 120px auto 60px; padding: 0 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: var(--radius); padding: 25px; text-align: center;
        }
        .stat-card h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; }
        .stat-card .value { font-size: 2.5rem; color: var(--accent-color); font-weight: 700; }
        
        .admin-section { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 30px; margin-bottom: 40px; }
        .admin-section h2 { margin-bottom: 20px; color: var(--accent-color); font-size: 1.5rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--card-border); }
        th { color: var(--text-muted); font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(0,0,0,0.05); }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .badge.success { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .badge.warning { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .badge.danger { background: rgba(231, 76, 60, 0.1); color: var(--danger); }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="logo">ELEGANCE ADMIN</div>
        <div class="header-controls">
            <a href="index.html" style="color: var(--text-color); text-decoration: none; font-weight: 500;">Back to Site</a>
        </div>
    </header>

    <main class="admin-main">
        <h1 style="margin-bottom: 30px;">Dashboard Overview</h1>
        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>Total Menu Items</h3>
                <div class="value" id="totalItemsStat">0</div>
            </div>
            <div class="stat-card">
                <h3>Orders Today</h3>
                <div class="value" id="ordersTodayStat">0</div>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <div class="value" id="revenueStat">₹0</div>
            </div>
        </div>

        <div class="admin-section">
            <h2>Recent Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Status</th>
                        <th>Amount</th>
                        <th>Time</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <!-- Populated dynamically by admin.js -->
                </tbody>
            </table>
        </div>

        <div class="admin-section" style="overflow-x: auto;">
            <h2>Inventory & Pricing</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price (₹)</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <!-- Populated via admin.js -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
